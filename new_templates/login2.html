<body class="bg-surface text-on-surface soft-blur-bg selection:bg-primary-fixed selection:text-on-primary-fixed">
<main class="login-container relative overflow-hidden">
<!-- Decorative background elements -->
<div class="absolute -top-24 -right-24 w-96 h-96 bg-primary opacity-[0.03] rounded-full blur-3xl"></div>
<div class="absolute -bottom-24 -left-24 w-80 h-80 bg-secondary opacity-[0.03] rounded-full blur-3xl"></div>
<div class="max-w-[1280px] w-full mx-auto grid grid-cols-1 lg:grid-cols-12 gap-xl items-center relative z-10">
<!-- Left Side: Form Content -->
<div class="lg:col-span-5 flex flex-col items-start justify-center p-md animate-in fade-in slide-in-from-left-8 duration-700">
<!-- Logo -->
<div class="mb-xl">
<span class="font-headline-lg font-bold text-primary tracking-tight text-headline-xl" data-stitch-orig-opacity="0">HR CRM</span>
</div>
<div class="w-full max-w-md">
<div class="flex p-1 bg-surface-container-high rounded-xl mb-xl w-full">
<button class="flex-1 py-2 px-4 rounded-lg font-label-md text-label-md transition-all text-on-surface-variant font-medium" id="tab-admin">Admin</button>
<button class="flex-1 py-2 px-4 rounded-lg font-label-md text-label-md hover:text-primary transition-all bg-surface-container-lowest text-primary shadow-sm font-semibold" id="tab-employee">Employee</button>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Employee Portal</h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-xl">Welcome back. Please enter your credentials to access your personal dashboard.</p>
<form action="#" class="space-y-md" method="POST">
<!-- Full Name Field (Hidden by default) -->
<div class="space-y-xs hidden" id="fullname-field">
<label class="block font-label-md text-label-md text-on-surface-variant" for="fullname">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">person</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-body-md font-body-md" id="fullname" name="fullname" placeholder="John Doe" type="text">
</div>
</div>
<!-- Email Field -->
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface-variant" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-body-md font-body-md" id="email" name="email" placeholder="admin@reerui.tech" required="" type="email">
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="block font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full pl-12 pr-12 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-body-md font-body-md" id="password" name="password" placeholder="••••••••" required="" type="password">
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Action Buttons -->

              Sign In 
              <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>

<!-- Footer Text -->

</div>

</div>

</div>

</div>

<script>
  // Simple Interaction for Visibility Toggle
  document.querySelectorAll('.material-symbols-outlined').forEach(icon => {
    if (icon.textContent === 'visibility') {
      icon.parentElement.addEventListener('click', function() {
        const input = this.parentElement.querySelector('input');
        if (input.type === 'password') {
          input.type = 'text';
          icon.textContent = 'visibility_off';
        } else {
          input.type = 'password';
          icon.textContent = 'visibility';
        }
      });
    }
  });

  // Role switching mock functionality
  const tabs = ['admin', 'employee', 'candidate'];
  tabs.forEach(role => {
    const btn = document.getElementById(`tab-${role}`);
    if (btn) {
      btn.addEventListener('click', () => {
        tabs.forEach(r => {
          const b = document.getElementById(`tab-${r}`);
          b.classList.remove('bg-surface-container-lowest', 'text-primary', 'shadow-sm', 'font-semibold');
          b.classList.add('text-on-surface-variant', 'font-medium');
        });
        btn.classList.add('bg-surface-container-lowest', 'text-primary', 'shadow-sm', 'font-semibold');
        btn.classList.remove('text-on-surface-variant', 'font-medium');
        
        const nameField = document.getElementById('fullname-field');
        if (role === 'candidate') {
          nameField.classList.remove('hidden');
        } else {
          nameField.classList.add('hidden');
        }
      });
    }
  });
</script>
